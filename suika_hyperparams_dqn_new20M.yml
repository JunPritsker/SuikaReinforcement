# A new 20M timestep run after the inital 20M timestep run stored at rl_baseline3_zoo/logs/dqn/SuikaEnv_v0_10
# Changes include, increase gamma, more exploration, linear learning rate instead of static, higher learning starts
# This might be too many variables to change at once to evalute but let's see. I also want to try adjusting training_freq to 8 and gradient_steps to 8
# This is being run AFTER scaling rewards by dividing by 100
SuikaEnv-v0:
  # algo: dqn
  policy: 'MlpPolicy'
  # --- Hardware Saturation Settings ---
  n_timesteps: !!float 2e7      # 20 million timesteps for real training
  n_envs: 48                    # 9800X3D can handle 32+ physics threads easily
  buffer_size: 1000000          # 1M transitions (DQN needs a large memory)
  batch_size: 4096              # 5090 needs huge batches to maintain high TFLOPS
  learning_starts: 100000       # Collect initial data before hitting the GPU
  train_freq: 4                 # Update every 4 steps
  gradient_steps: 16            # Do 16 updates per train_freq to keep GPU busy
  
  # --- Algorithm Hyperparameters ---
  learning_rate: !!float 5e-5   # Slightly higher to compensate for huge batch size
  gamma: 0.99                   
  exploration_fraction: 0.1     # Explore for the first 10% of training
  exploration_final_eps: 0.05
  target_update_interval: 1  # How often to sync the "target" network
  tau: 0.005                    # SBX uses Polyak averaging for smoother updates
  
  # --- Brain Capacity ---
  policy_kwargs: "dict(net_arch=[512, 512, 512])"

  callback: 'rl_env.callbacks.GameScoreCallback'

  env_kwargs:
    spatial_features: false
    clustering: false
    # debug: true

